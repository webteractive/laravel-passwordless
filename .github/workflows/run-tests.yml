name: run-tests

on:
  push:
    paths:
      - '**.php'
      - '.github/workflows/run-tests.yml'
      - 'phpunit.xml.dist'
      - 'composer.json'
      - 'composer.lock'
  pull_request:
    paths:
      - '**.php'
      - '.github/workflows/run-tests.yml'
      - 'phpunit.xml.dist'
      - 'composer.json'
      - 'composer.lock'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: true
      matrix:
        php: ['8.3', '8.4']
        laravel: ['13.*', '12.*', '11.*']
        stability: [prefer-stable]
        db: [sqlite]
        include:
          - laravel: '13.*'
            testbench: '11.*'
          - laravel: '12.*'
            testbench: '10.*'
          - laravel: '11.*'
            testbench: '9.*'
          - laravel: '13.*'
            php: '8.4'
            testbench: '11.*'
            stability: prefer-stable
            db: mysql
          - laravel: '13.*'
            php: '8.4'
            testbench: '11.*'
            stability: prefer-stable
            db: pgsql

    name: P${{ matrix.php }} - L${{ matrix.laravel }} - ${{ matrix.db }} - ${{ matrix.stability }}

    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: passwordless
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: passwordless
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, pdo_mysql, pdo_pgsql, bcmath, intl, fileinfo
          coverage: none

      - name: Setup problem matchers
        run: |
          echo "::add-matcher::${{ runner.tool_cache }}/php.json"
          echo "::add-matcher::${{ runner.tool_cache }}/phpunit.json"

      - name: Install dependencies
        env:
          LARAVEL_VERSION: ${{ matrix.laravel }}
          TESTBENCH_VERSION: ${{ matrix.testbench }}
          STABILITY: ${{ matrix.stability }}
        run: |
          composer require "laravel/framework:${LARAVEL_VERSION}" "orchestra/testbench:${TESTBENCH_VERSION}" --no-interaction --no-update
          composer update --${STABILITY} --prefer-dist --no-interaction

      - name: List Installed Dependencies
        run: composer show -D

      - name: Execute tests (sqlite)
        if: matrix.db == 'sqlite'
        run: vendor/bin/pest --ci

      - name: Execute tests (mysql)
        if: matrix.db == 'mysql'
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: '3306'
          DB_DATABASE: passwordless
          DB_USERNAME: root
          DB_PASSWORD: root
        run: vendor/bin/pest --ci

      - name: Execute tests (pgsql)
        if: matrix.db == 'pgsql'
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: '5432'
          DB_DATABASE: passwordless
          DB_USERNAME: postgres
          DB_PASSWORD: postgres
        run: vendor/bin/pest --ci
